<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFC Personal Page</title>

<style>

body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
width:320px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.profile{
width:110px;
height:110px;
border-radius:50%;
margin-bottom:15px;
border:3px solid #38bdf8;
box-shadow:0 0 15px rgba(56,189,248,0.6);
}

a{
display:block;
background:#38bdf8;
color:#000;
text-decoration:none;
padding:12px;
margin:10px 0;
border-radius:12px;
font-weight:bold;
}

.gallery{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:15px;
}

.gallery img{
width:90px;
height:90px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.1);
}

/* popup */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.popup img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

</style>
</head>

<body>

<div class="card">

<img class="profile" src="profile.jpg">

<h1>FETHI ELHADJ</h1>
<p>Directeur de Division</p>

<a href="https://wa.me/21623443570">WhatsApp</a>
<a href="tel:+21623443570">Call Me</a>
<a href="https://maps.app.goo.gl/44UasxCep2Y6iMVi7">Location</a>
<a href="mailto:fethi.elhadj@cotupap.com.tn">Email Me</a>
<a href="https://cotupapstore.com.tn">My Website</a>
<a href="contact.vcf">Enregistrer Contact</a>

<div class="gallery">

<img src="images/img1.jpg" onclick="openImg(this)">
<img src="images/img2.jpg" onclick="openImg(this)">
<img src="images/img3.jpg" onclick="openImg(this)">

</div>

</div>

<div class="popup" id="popup" onclick="closeImg()">
<img id="popupImg">
</div>

<script>

function openImg(img){
document.getElementById("popup").style.display="flex"
document.getElementById("popupImg").src=img.src
}

function closeImg(){
document.getElementById("popup").style.display="none"
}

</script>

</body>
</html>
